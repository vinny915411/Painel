<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Patrimônio - Restrito</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- TELA DE LOGIN PROFISSIONAL -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>Área Restrita</h2>
            <p>Faça login para acessar o painel financeiro</p>
        </div>
        
        <div id="loginAlert" class="login-alert hidden"></div>

        <div class="login-form">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button onclick="realizarLogin()" class="btn-login">Entrar</button>
            
      <div class="biometric-divider">
                <span>desenvolvido por</span>
            </div>

            <!-- Assinatura Adaptativa com Ícone de Digital Circular -->
            <div onclick="autenticarBiometria()" id="btnBiometria" class="dev-signature-box">
                <!-- Ícone da Digital com Círculo (idêntico à imagem) -->
                <svg class="fingerprint-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 15a3 3 0 0 0 3-3c0-1.66-1.34-3-3-3s-3 1.34-3 3"/>
                    <path d="M12 18a6 6 0 0 0 6-6c0-3.31-2.69-6-6-6s-6 2.69-6 6v1"/>
                    <path d="M12 9a3 3 0 0 1 3 3v2"/>
                </svg>

                <span class="text-pc">Nexus System</span>
                <span class="text-mobile">acesso biométrico</span>
            </div>
        </div>
    </div>
</div>

<!-- CONTEÚDO PRINCIPAL (BLOQUEADO POR PADRÃO) -->
<div id="mainContent" class="container hidden">

    <div class="header">
        <div class="user-badge">
            <span id="nomeUsuarioLogado"></span>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>
        <h1>Patrimônio Mensal</h1>
        <div id="saldoAtual">R$ 0,00</div>
    </div>

    <div class="chart-container">
        <canvas id="equityChart"></canvas>
    </div>

    <!-- BOTÕES -->
    <div class="filters">
        <button onclick="filtrar('geral')">Geral</button>
        <button onclick="filtrar('semanal')">Semanal</button>
        <button onclick="filtrar('mensal')">Mensal</button>

        <button onclick="resetar()" style="border-color:#ff4d4d; color:#ff4d4d;">
            Reset
        </button>
    </div>

    <!-- INPUT -->
    <div class="form">
        <input type="number" id="valor" placeholder="Digite o resultado (+ ou -)">
        <button onclick="adicionarOperacao()">Adicionar</button>
    </div>

    <!-- HISTÓRICO -->
    <div class="historico">
        <h3>Histórico</h3>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Resultado</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody id="historicoBody"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
