<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Patrimônio - Restrito</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- TELA DE LOGIN PROFISSIONAL -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>Área Restrita</h2>
            <p>Faça login para acessar o painel financeiro</p>
        </div>
        
        <div id="loginAlert" class="login-alert hidden"></div>

        <div class="login-form">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button onclick="realizarLogin()" class="btn-login">Entrar</button>
            
   <div class="biometric-divider">
                <span>desenvolvido por</span>
            </div>

            <!-- Botão Biométrico Corrigido (Cópia Exata da Imagem) -->
            <div onclick="autenticarBiometria()" id="btnBiometria" class="dev-app-biometric">
                <!-- SVG Fiel à Imagem com Múltiplas Linhas de Digital -->
                <svg class="app-fingerprint-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
                    <!-- Círculo externo perfeito -->
                    <circle cx="50" cy="50" r="44" stroke-width="3.5" />
                    
                    <!-- Linha central (o núcleo) -->
                    <path d="M50,45 v20A5,5 0 0,1 40,65" />
                    
                    <!-- Primeira camada de curvas em volta do núcleo -->
                    <path d="M44,40 a9,9 0 0,1 12,0 v25" />
                    <path d="M38,45 v15 a15,15 0 0,0 6,12" />
                    
                    <!-- Segunda camada de curvas intermediárias -->
                    <path d="M37,36 a17,17 0 0,1 26,0 v24" />
                    <path d="M31,52 v-4 a22,22 0 0,1 38,0 v12" />
                    
                    <!-- Terceira camada de curvas externas (idêntico à foto) -->
                    <path d="M32,30 a25,25 0 0,1 36,0" />
                    <path d="M26,58 v-4 a30,30 0 0,1 8,-21" />
                    <path d="M66,33 a30,30 0 0,1 8,21 v4" />
                    
                    <!-- Pequenas linhas da base inferior -->
                    <path d="M34,68 a18,18 0 0,0 8,6" />
                    <path d="M58,74 a18,18 0 0,0 8,-6" />
                </svg>

                <span class="app-biometric-text">Acesso Biométrico</span>
            </div>
        </div>
    </div>
</div>

<!-- CONTEÚDO PRINCIPAL (BLOQUEADO POR PADRÃO) -->
<div id="mainContent" class="container hidden">

    <div class="header">
        <div class="user-badge">
            <span id="nomeUsuarioLogado"></span>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>
        <h1>Patrimônio Mensal</h1>
        <div id="saldoAtual">R$ 0,00</div>
    </div>

    <div class="chart-container">
        <canvas id="equityChart"></canvas>
    </div>

    <!-- BOTÕES -->
    <div class="filters">
        <button onclick="filtrar('geral')">Geral</button>
        <button onclick="filtrar('semanal')">Semanal</button>
        <button onclick="filtrar('mensal')">Mensal</button>

        <button onclick="resetar()" style="border-color:#ff4d4d; color:#ff4d4d;">
            Reset
        </button>
    </div>

    <!-- INPUT -->
    <div class="form">
        <input type="number" id="valor" placeholder="Digite o resultado (+ ou -)">
        <button onclick="adicionarOperacao()">Adicionar</button>
    </div>

    <!-- HISTÓRICO -->
    <div class="historico">
        <h3>Histórico</h3>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Resultado</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody id="historicoBody"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
