<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Patrimônio - Restrito</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- TELA DE LOGIN PROFISSIONAL -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>Área Restrita</h2>
            <p>Faça login para acessar o painel financeiro</p>
        </div>
        
        <div id="loginAlert" class="login-alert hidden"></div>

        <div class="login-form">
            <div class="input-group">
                <label for="username">Usuário</label>
                <!-- Modificado: Adicionado autocomplete="username" -->
                <input type="text" id="username" placeholder="Digite seu usuário" autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <!-- Modificado: Adicionado autocomplete="new-password" -->
                <input type="password" id="password" placeholder="Digite sua senha" autocomplete="new-password">
            </div>

            <button onclick="realizarLogin()" class="btn-login">Entrar</button>
           <div class="biometric-divider">
                <span>desenvolvido por</span>
            </div>

            <!-- CONTAINER ADAPTATIVO (PC vs CELULAR) -->
            <div onclick="autenticarBiometria()" id="btnBiometria" class="auth-footer-container">
                
                <!-- VERSÃO PC: Ícone do Planeta + Nome (Esconde no Celular) -->
                <div class="view-pc">
                    <svg class="planet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                        <path d="M2 12h20"/>
                    </svg>
                    <span>Nexus System</span>
                </div>

                <!-- VERSÃO CELULAR: Ícone da Digital + Acesso Biométrico (Esconde no PC) -->
                <div class="view-mobile">
                    <img src="digital.png" alt="Acesso Biométrico" class="app-fingerprint-img">
                    <span class="app-biometric-text">Acesso Biométrico</span>
                </div>

            </div> 
  
        </div>
    </div>
</div>

<!-- CONTEÚDO PRINCIPAL (BLOQUEADO POR PADRÃO) -->
<div id="mainContent" class="container hidden">

    <div class="header">
        <div class="user-badge">
            <span id="nomeUsuarioLogado"></span>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>
        <h1>Patrimônio Mensal</h1>
        <div id="saldoAtual">R$ 0,00</div>
    </div>

    <div class="chart-container">
        <canvas id="equityChart"></canvas>
    </div>

    <!-- BOTÕES -->
    <div class="filters">
        <button onclick="filtrar('geral')">Geral</button>
        <button onclick="filtrar('semanal')">Semanal</button>
        <button onclick="filtrar('mensal')">Mensal</button>

        <button onclick="resetar()" style="border-color:#ff4d4d; color:#ff4d4d;">
            Reset
        </button>
    </div>

    <!-- INPUT -->
    <div class="form">
        <input type="number" id="valor" placeholder="Digite o resultado (+ ou -)">
        <button onclick="adicionarOperacao()">Adicionar</button>
    </div>

    <!-- HISTÓRICO -->
    <div class="historico">
        <h3>Histórico</h3>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Resultado</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody id="historicoBody"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
